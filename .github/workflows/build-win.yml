name: Build Windows

on:
  push:
    tags:
      - 'v*'       # trigger on version tags: v1.0.0, v1.2.3, etc.
  workflow_dispatch: # allow manual trigger from GitHub Actions UI

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Python ───────────────────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
          pip install -r api/requirements.txt
          pip install pyinstaller

      # ── Download platform binaries (ffmpeg, ffprobe, fpcalc) ─────────────────
      - name: Download Windows binaries
        run: npm run download-bins:win

      # ── Build Python backend ──────────────────────────────────────────────────
      - name: Build Python API (PyInstaller)
        run: pyinstaller dj_clipper_api.spec

      # ── Node / Electron ───────────────────────────────────────────────────────
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Build React + compile Electron TypeScript
        run: npm run build

      # ── Package with electron-builder ────────────────────────────────────────
      - name: Package Windows app
        env:
          # Code signing (optional — SmartScreen warning without this)
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
          # GitHub token for uploading release assets
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --win --config electron-builder.yml

      # ── Upload artifacts ──────────────────────────────────────────────────────
      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: DJ-Clipper-win
          path: release/*.exe
          retention-days: 30
