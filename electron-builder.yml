appId: com.cliplab.app
productName: Clip Lab
copyright: Copyright © 2026 Biscuit Boy

# ── Source files included in the Electron app ────────────────────────────────
files:
  - dist/index.html       # Vite React build
  - dist/assets/**        # Vite assets
  - electron/main.js      # compiled Electron TS
  - electron/preload.js
  - electron/pythonManager.js
  - electron/license.js
  - package.json

# ── Extra resources bundled inside the .app / installer ──────────────────────
# These are NOT in the asar archive — they live in Contents/Resources/ (mac)
# or resources/ (win) so the Python binary can be executed.
#
# NOTE: dj_clipper_api/ and bin/ are built/downloaded before running electron-builder.
# Run:  pyinstaller dj_clipper_api.spec           → produces dist/dj_clipper_api/
#       npm run download-bins:mac  (or :win)       → populates resources/bin/

# ── macOS ─────────────────────────────────────────────────────────────────────
mac:
  target:
    - target: dmg
      arch:
        - arm64    # Apple Silicon (M1/M2/M3)
        - x64      # Intel Mac
  category: public.app-category.music
  icon: resources/icons/icon.icns
  # Ad-hoc signing — free, no Apple Developer account needed.
  # Lets arm64 apps run on Apple Silicon without the "damaged" Gatekeeper error.
  # Users still need to right-click → Open the first time (no notarization).
  identity: '-'
  hardenedRuntime: false
  gatekeeperAssess: false
  entitlements: resources/entitlements.mac.plist
  entitlementsInherit: resources/entitlements.mac.plist
  extraResources:
    - from: dist/dj_clipper_api
      to: dj_clipper_api
    - from: resources/bin/mac
      to: bin/mac

directories:
  output: release

dmg:
  background: null
  window:
    width: 540
    height: 380

# Notarization runs after signing — requires APPLE_ID / APPLE_APP_SPECIFIC_PASSWORD
# / APPLE_TEAM_ID env vars. Script is a no-op if they are not set.
afterSign: scripts/notarize.js

# ── Windows ───────────────────────────────────────────────────────────────────
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: resources/icons/icon.ico
  extraResources:
    - from: dist/dj_clipper_api
      to: dj_clipper_api
    - from: resources/bin/win
      to: bin/win

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  installerIcon: resources/icons/icon.ico
  uninstallerIcon: resources/icons/icon.ico
  license: null

# ── Shared publish config (GitHub Releases) ───────────────────────────────────
publish:
  provider: github
  releaseType: draft
